name: Auto Update News DB

# 毎日 朝7時 と 夜19時（日本時間）に自動実行する
on:
  schedule:
    - cron: '0 22,10 * * *' # UTC時間（日本時間の-9時間で指定）
  workflow_dispatch: # GitHubの画面から手動で実行するボタンも一応つける

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      # 1. 君の城（リポジトリ）のデータをロボットが読み込む
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Pythonの準備
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 必要な道具のインストール
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. 【重要】ニュース収集＆掃除の実行！
      - name: Run app.py to update DB
        　env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python app.py

      # 5. 更新された news.db を君のGitHubに自動で上書き保存（プッシュ）
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.db
          # もしDBに変更があればコミットしてプッシュする
          git commit -m "Auto-update news.db" || exit 0
          git push